<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quieres salir conmigo?</title>
<style>
       * {
           box-sizing: border-box;
           margin: 0;
           padding: 0;
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
       }
body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;

    background-image: url("IMG/fondo.jpg");
    background-size: cover;      /* Hace que cubra toda la pantalla */
    background-position: center; /* Centra la imagen */
    background-repeat: no-repeat;
    background-attachment: fixed; /* Opcional */
}
       .card {
           background: white;
           padding: 30px;
           border-radius: 15px;
           box-shadow: 0 10px 25px rgba(0,0,0,0.1);
           text-align: center;
           width: 90%;
           max-width: 450px;
           transition: all 0.3s ease;
       }
       h1 {
           color: #333;
           font-size: 24px;
           margin-bottom: 20px;
       }
       .heart {
           color: #ff4d6d;
       }
       .gif-container {
           margin-bottom: 20px;
           height: 180px;
           display: flex;
           justify-content: center;
           align-items: center;
       }
       .gif-container img {
           max-height: 100%;
           border-radius: 10px;
       }
       .btn-container {
           display: flex;
           justify-content: center;
           gap: 20px;
           margin-top: 20px;
           position: relative;
           height: 50px;
       }
       button {
           padding: 10px 25px;
           font-size: 16px;
           font-weight: bold;
           border: none;
           border-radius: 20px;
           cursor: pointer;
           transition: transform 0.1s ease;
       }
       #btn-si {
           background-color: #4cc9f0;
           color: white;
       }
       #btn-si:hover {
           transform: scale(1.05);
       }
       #btn-no {
           background-color: #ff4d6d;
           color: white;
           position: absolute;
           left: 55%; /* Posición inicial */
       }
       .message {
           margin-top: 15px;
           font-size: 20px;
           color: #666;
           font-style: italic;
           min-height: 20px;
       }
</style>
</head>
<body>
<div class="card" id="main-card">
<h1 id="title">¿Quieres salir conmigo? <span class="heart">❤</span></h1>
<div class="gif-container">
<img id="gif" src="IMG/perritos.jpg" alt="Ositos tiernos">
</div>
<div class="btn-container" id="buttons-section">
<button id="btn-si">¡Sí!</button>
<button id="btn-no">No</button>
</div>
<p class="message" id="sub-message"></p>
</div>
<script>
       const btnNo = document.getElementById('btn-no');
       const btnSi = document.getElementById('btn-si');
       const messageText = document.getElementById('sub-message');
       const gifImg = document.getElementById('gif');
       const titleText = document.getElementById('title');
       const btnContainer = document.getElementById('buttons-section');
       const frases = [
           "¿Segura?",
           "Piénsalo otra vez",
           "Vamos,añale",
           "Tus perritos quieren que vayas",
           "Me romperás el corazón 💔",
           "Eres cruel 😢"
       ];
       let clickCount = 0;
       function moverBotonNo() {
           if (clickCount < frases.length) {
               messageText.textContent = frases[clickCount];
               clickCount++;
           } else {
               messageText.textContent = frases[frases.length - 1];
           }
           // Calcular posiciones aleatorias dentro de la pantalla, evitando que se salga
           const padding = 20;
           const maxX = window.innerWidth - btnNo.offsetWidth - padding;
           const maxY = window.innerHeight - btnNo.offsetHeight - padding;
           const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
           const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;
           // Sacamos el botón de su contenedor original y lo volvemos flotante en toda la pantalla
           btnNo.style.position = 'fixed';
           btnNo.style.left = randomX + 'px';
           btnNo.style.top = randomY + 'px';
       }
       // Se activa al pasar el mouse por encima (computadora) o al tocarlo (móvil)
       btnNo.addEventListener('mouseenter', moverBotonNo);
       btnNo.addEventListener('touchstart', (e) => {
           e.preventDefault(); // Evita clics fantasmas en móviles
           moverBotonNo();
       });
       // Evento cuando finalmente le da al botón "Sí"
       btnSi.addEventListener('click', () => {
           // Cambiar el título
           titleText.innerHTML = "Vamos a ver Sultan...Grupo Costumbre jaja mañana <span class='heart'>❤</span>";
           gifImg.src = "IMG/sultanes.jpg";
           // Cambiar el mensaje de abajo
           messageText.textContent = "¡Ya te quiero ver!";
           messageText.style.color = "#333";
           messageText.style.fontWeight = "bold";
           // Ocultar los botones completamente
           btnContainer.style.display = 'none';
       });
</script>
</body>
</html>
